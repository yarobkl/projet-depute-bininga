<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BININGA — Espace Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#060606;color:#fff;min-height:100vh}
#login{position:fixed;inset:0;background:#060606;display:flex;align-items:center;justify-content:center;z-index:9999}
#login.hidden{display:none}
.box{background:#111;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:40px;width:100%;max-width:400px;text-align:center}
.box h1{font-size:24px;margin-bottom:20px;color:#C8102E}
.box input{width:100%;padding:12px;margin-bottom:12px;background:#1c1c1c;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:14px}
.box button{width:100%;padding:12px;background:#C8102E;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px}
.box button:hover{background:#8B0A1E}
.err{color:#ff6b6b;font-size:12px;margin-top:10px}
#app{display:none}
#app.visible{display:flex;min-height:100vh}
.sidebar{width:250px;background:#111;border-right:1px solid rgba(255,255,255,.1);padding:20px;display:flex;flex-direction:column}
.sidebar h2{font-size:14px;margin-bottom:20px;color:#C8102E}
.sb-item{padding:12px 16px;margin-bottom:8px;border-radius:8px;cursor:pointer;font-size:13px;border:1px solid transparent;transition:all .3s}
.sb-item:hover{background:rgba(200,16,46,.1);border-color:rgba(200,16,46,.2)}
.sb-item.active{background:rgba(200,16,46,.2);border-color:#C8102E;color:#C8102E}
.sidebar button{width:100%;padding:10px;background:#C8102E;color:#fff;border:none;border-radius:8px;margin-top:auto;cursor:pointer;font-size:12px}
.main{flex:1;padding:30px;overflow-y:auto}
.panel{display:none}
.panel.active{display:block}
.card{background:#111;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:20px;margin-bottom:20px}
.card h3{font-size:16px;margin-bottom:15px;color:#C8102E}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.form-group input, .form-group textarea{width:100%;padding:10px;background:#1c1c1c;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#fff;font-size:14px;font-family:inherit}
.form-group input:focus, .form-group textarea:focus{border-color:#C8102E;outline:none}
.form-group textarea{resize:vertical;min-height:80px}
#toast{position:fixed;bottom:20px;right:20px;background:#2ecc71;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s}
#toast.show{transform:translateY(0);opacity:1}
#toast.err{background:#e74c3c}
.msg-card{background:#1c1c1c;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:16px;margin-bottom:12px;font-size:13px;line-height:1.6}
.msg-card .msg-date{font-size:11px;color:rgba(255,255,255,.3);margin-bottom:8px}
.msg-card .msg-field{margin-bottom:4px}.msg-card .msg-key{color:rgba(255,255,255,.4);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-right:6px}
.msg-empty{color:rgba(255,255,255,.25);font-size:14px;text-align:center;padding:40px 0}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <h1>🛡️ Admin</h1>
    <input type="text" id="user" placeholder="Identifiant">
    <input type="password" id="pass" placeholder="Mot de passe">
    <button onclick="doLogin()">Connexion</button>
    <div class="err" id="err"></div>
    <p style="font-size:11px;color:rgba(255,255,255,.2);margin-top:20px">admin / bininga2025</p>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <h2>BININGA Admin</h2>
    <div class="sb-item active" onclick="showPanel('hero')">🏠 Hero</div>
    <div class="sb-item" onclick="showPanel('about')">👤 À propos</div>
    <div class="sb-item" onclick="showPanel('stats')">📊 Stats</div>
    <div class="sb-item" onclick="showPanel('seo')">🔍 SEO</div>
    <div class="sb-item" onclick="showPanel('audiences')" id="sb-audiences">📋 Audiences <span id="badge-aud" style="background:#C8102E;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;display:none"></span></div>
    <div class="sb-item" onclick="showPanel('contacts')" id="sb-contacts">✉️ Messages <span id="badge-ct" style="background:#C8102E;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;display:none"></span></div>
    <button onclick="saveData()">💾 Enregistrer</button>
    <button onclick="logout()" style="background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);margin-top:10px">Déconnexion</button>
  </div>

  <div class="main">
    <div class="panel active" id="panel-hero">
      <div class="card">
        <h3>Hero</h3>
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" data-key="hero.firstName">
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" data-key="hero.lastName">
        </div>
        <div class="form-group">
          <label>Rôle</label>
          <input type="text" data-key="hero.role">
        </div>
        <div class="form-group">
          <label>Slogan</label>
          <input type="text" data-key="hero.slogan">
        </div>
        <div class="form-group">
          <label>Sous-titre</label>
          <textarea data-key="hero.subtitle"></textarea>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-about">
      <div class="card">
        <h3>À propos</h3>
        <div class="form-group">
          <label>Titre</label>
          <input type="text" data-key="about.title">
        </div>
        <div class="form-group">
          <label>Introduction</label>
          <textarea data-key="about.intro"></textarea>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-stats">
      <div class="card">
        <h3>Statistiques</h3>
        <div id="stats-list"></div>
      </div>
    </div>

    <div class="panel" id="panel-seo">
      <div class="card">
        <h3>SEO</h3>
        <div class="form-group">
          <label>Titre</label>
          <input type="text" data-key="seo.title">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea data-key="seo.description"></textarea>
        </div>
      </div>
    </div>

    <!-- Panel Demandes d'audience -->
    <div class="panel" id="panel-audiences">
      <div class="card">
        <h3>📋 Demandes d'audience <button onclick="clearMessages('bininga_audiences','panel-audiences')" style="float:right;background:#e74c3c;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px">🗑️ Tout effacer</button></h3>
        <div id="list-audiences" style="margin-top:16px"></div>
      </div>
    </div>

    <!-- Panel Messages de contact -->
    <div class="panel" id="panel-contacts">
      <div class="card">
        <h3>✉️ Messages de contact <button onclick="clearMessages('bininga_contacts','panel-contacts')" style="float:right;background:#e74c3c;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px">🗑️ Tout effacer</button></h3>
        <div id="list-contacts" style="margin-top:16px"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const ADMIN = "admin";
const PASS = "bininga2025";
let data = {};

function doLogin(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;
  if(u === ADMIN && p === PASS){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.add("visible");
    loadData();
    updateBadges();
  }else{
    document.getElementById("err").textContent = "Identifiant ou mot de passe incorrect";
  }
}

function logout(){
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("app").classList.remove("visible");
  document.getElementById("user").value = "";
  document.getElementById("pass").value = "";
}

document.addEventListener("keydown", e => {
  if(e.key === "Enter" && !document.getElementById("login").classList.contains("hidden")) doLogin();
});

function loadData(){
  fetch("/api/load")
    .then(r => r.json())
    .then(d => {
      data = d;
      populateForm();
      renderStats();
    });
}

function populateForm(){
  document.querySelectorAll("[data-key]").forEach(el => {
    const keys = el.dataset.key.split(".");
    let val = data;
    keys.forEach(k => val = val[k] || "");
    el.value = val;
  });
}

function renderStats(){
  const list = document.getElementById("stats-list");
  list.innerHTML = "";
  (data.stats || []).forEach((s, i) => {
    const div = document.createElement("div");
    div.style.cssText = "display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px";
    div.innerHTML = `
      <div class="form-group">
        <label>Chiffre ${i+1}</label>
        <input type="text" value="${s.num}" onchange="data.stats[${i}].num=this.value">
      </div>
      <div class="form-group">
        <label>Libellé ${i+1}</label>
        <input type="text" value="${s.label}" onchange="data.stats[${i}].label=this.value">
      </div>
    `;
    list.appendChild(div);
  });
}

function collectForm(){
  document.querySelectorAll("[data-key]").forEach(el => {
    const keys = el.dataset.key.split(".");
    let obj = data;
    for(let i = 0; i < keys.length - 1; i++){
      if(!obj[keys[i]]) obj[keys[i]] = {};
      obj = obj[keys[i]];
    }
    obj[keys[keys.length-1]] = el.value;
  });
}

function saveData(){
  collectForm();
  fetch("/api/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-Admin-Token": `${ADMIN}:${PASS}`
    },
    body: JSON.stringify(data)
  })
  .then(r => r.json())
  .then(res => {
    showToast(res.ok ? "Sauvegardé !" : res.message, !res.ok);
  });
}

function showPanel(name){
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".sb-item").forEach(i => i.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");
  event.currentTarget.classList.add("active");
  if(name === "audiences") renderMessages("bininga_audiences", "list-audiences");
  if(name === "contacts")  renderMessages("bininga_contacts",  "list-contacts");
}

function renderMessages(storageKey, containerId){
  const list = JSON.parse(localStorage.getItem(storageKey) || "[]");
  const el = document.getElementById(containerId);
  if(!list.length){ el.innerHTML = '<div class="msg-empty">Aucun message reçu.</div>'; return; }
  el.innerHTML = list.map(m => {
    const fields = Object.entries(m).filter(([k]) => k !== "_date")
      .map(([k,v]) => `<div class="msg-field"><span class="msg-key">${k}</span>${v}</div>`).join("");
    return `<div class="msg-card"><div class="msg-date">📅 ${m._date}</div>${fields}</div>`;
  }).join("");
}

function clearMessages(storageKey, panelId){
  if(!confirm("Supprimer tous les messages ?")) return;
  localStorage.removeItem(storageKey);
  const containerId = panelId === "panel-audiences" ? "list-audiences" : "list-contacts";
  document.getElementById(containerId).innerHTML = '<div class="msg-empty">Aucun message reçu.</div>';
  const badgeId = storageKey === "bininga_audiences" ? "badge-aud" : "badge-ct";
  document.getElementById(badgeId).style.display = "none";
  showToast("Messages supprimés.");
}

function updateBadges(){
  const aud = JSON.parse(localStorage.getItem("bininga_audiences") || "[]");
  const ct  = JSON.parse(localStorage.getItem("bininga_contacts")  || "[]");
  const ba = document.getElementById("badge-aud");
  const bc = document.getElementById("badge-ct");
  if(aud.length){ ba.textContent = aud.length; ba.style.display = "inline"; } else { ba.style.display = "none"; }
  if(ct.length){  bc.textContent = ct.length;  bc.style.display = "inline"; } else { bc.style.display = "none"; }
}

function showToast(msg, err=false){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show" + (err ? " err" : "");
  setTimeout(() => t.className = "", 3000);
}
</script>
</body>
</html>
