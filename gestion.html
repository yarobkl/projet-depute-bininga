<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BININGA — Accès Privé</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--r:#C8102E;--rd:#8B0A1E;--g:#B8973A;--gd:#8a6e20;--gl:#d4b96a;--n:#060606;--n2:#0e0e0e;--n3:#161616;--w:#fff;--t:all .3s ease}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--n);color:var(--w);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse at 50% 0%,rgba(200,16,46,.06) 0%,transparent 60%)}

.logo{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:48px;font-weight:600}
.logo span{color:var(--r)}

.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;width:100%;max-width:700px}

.card{flex:1;min-width:260px;max-width:320px;background:var(--n2);border-radius:16px;padding:40px 32px;text-align:center;text-decoration:none;color:var(--w);transition:var(--t);cursor:pointer;border:1px solid rgba(255,255,255,.06)}

.card:hover{transform:translateY(-6px)}

.card-icon{width:64px;height:64px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 24px}

.card.admin .card-icon{background:rgba(200,16,46,.15);border:1px solid rgba(200,16,46,.25)}
.card.admin:hover{border-color:rgba(200,16,46,.3);box-shadow:0 20px 60px rgba(200,16,46,.15)}

.card.depute .card-icon{background:rgba(200,16,46,.15);border:1px solid rgba(200,16,46,.25)}
.card.depute:hover{border-color:rgba(200,16,46,.3);box-shadow:0 20px 60px rgba(200,16,46,.15)}

.card-title{font-size:17px;font-weight:700;margin-bottom:8px}
.card-sub{font-size:12px;color:rgba(255,255,255,.3);line-height:1.6}

.card-btn{display:inline-block;margin-top:24px;padding:10px 24px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:.5px}
.card.admin .card-btn{background:var(--r);color:#fff}
.card.depute .card-btn{background:var(--r);color:#fff}

.back{margin-top:40px;font-size:12px;color:rgba(255,255,255,.2);text-decoration:none;transition:var(--t)}
.back:hover{color:rgba(255,255,255,.5)}
</style>
</head>
<body>

<div class="logo">BININGA · <span>Accès Privé</span></div>

<div class="cards">

  <a href="admin.html" class="card admin">
    <div class="card-icon">⚙️</div>
    <div class="card-title">Accès Admin</div>
    <div class="card-sub">Gestion complète du site, des utilisateurs et des données</div>
    <div class="card-btn">Accéder →</div>
  </a>

  <a href="ministre.html" class="card depute">
    <div class="card-icon">🏛️</div>
    <div class="card-title">Accès Député Bininga</div>
    <div class="card-sub">Tableau de bord du Député, signalements et suivi de terrain</div>
    <div class="card-btn">Accéder →</div>
  </a>

</div>

<a href="index.html" class="back">← Retour au site</a>

</body>
</html>
