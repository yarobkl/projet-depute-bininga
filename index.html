<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Chatbot</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
        }

        .chatbot-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chatbot-bubble {
            background: linear-gradient(45deg, #00fffa, #00ffff);
            border-radius: 50%;
            color: #fff;
            font-size: 16px;
            padding: 10px 20px;
            text-align: center;
            white-space: nowrap;
            opacity: 0.9;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>
<body id="body">
    <div class="chatbot-container">
        <div class="chatbot-bubble">Hello!</div>
    </div>

    <script>
        const chatbotBubble = document.querySelector('.chatbot-bubble');

        // Animation effect
        chatbotBubble.style.animation = 'float 3s infinite ease-in-out';

        // Resize effect
        window.addEventListener('resize', () => {
            chatbotBubble.style.left = '50%';
            chatbotBubble.style.transform = 'translateX(-50%)';
        });

        chatbotBubble.addEventListener('click', () => {
            chatbotBubble.textContent = "Ça va et toi ?";
        });
    </script>

<script>
  window.addEventListener('load', () => {

    const chatBtn = document.querySelector('button') || document.querySelector('.send-btn');
    const chatInput = document.querySelector('input') || document.querySelector('.chat-input');

    if(chatBtn) {
      chatBtn.addEventListener('click', () => {
        const text = chatInput.value;
        if(!text) return;
        
        // On attend un court instant pour simuler l'IA
        setTimeout(() => {
            const botResponse = document.createElement('div');
            botResponse.innerHTML = "<b>DA (Gemma 3) :</b> Ça va super et toi ? Ravi de te voir sur le site du Ministre !";
            botResponse.style.color = "#00ffcc"; // Couleur néon Bakal'os
            document.body.appendChild(botResponse);
        }, 800);
      });
    }
  });</script>
</body>
</html>
