[build]
builder = "nixpacks"

[deploy]
startCommand = "python3 -c \"import os,subprocess,sys; subprocess.run([sys.executable, 'server_public.py' if os.environ.get('SERVER_MODE')=='public' else 'server.py'])\""
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
